name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JAVA_TOOL_OPTIONS: -Xmx4096m -Dfile.encoding=UTF-8
      GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl unzip file dos2unix

      - name: Locate Android project
        shell: bash
        run: |
          set -euo pipefail

          has_project() {
            local d="$1"
            [ -f "$d/settings.gradle" -o -f "$d/settings.gradle.kts" ] &&
              [ -f "$d/app/build.gradle" -o -f "$d/app/build.gradle.kts" ]
          }

          PROJECT_DIR="."
          if ! has_project "."; then
            ZIP_FILE="$(find . -maxdepth 2 -type f -iname "*.zip" -printf "%p\n" | head -n 1 || true)"
            if [ -z "$ZIP_FILE" ]; then
              echo "No Android project and no zip found."
              echo "== Repo root =="
              ls -la
              exit 2
            fi

            echo "Unpacking $ZIP_FILE"
            rm -rf __unpacked
            mkdir -p __unpacked
            unzip -q "$ZIP_FILE" -d __unpacked

            PROJECT_DIR="$(find __unpacked -maxdepth 6 -type f \( -name "settings.gradle" -o -name "settings.gradle.kts" \) -printf "%h\n" | head -n 1 || true)"
            if [ -z "$PROJECT_DIR" ] || ! has_project "$PROJECT_DIR"; then
              echo "Android project not found inside zip."
              find __unpacked -maxdepth 4 -type f -name "settings.gradle*" -print || true
              exit 3
            fi
          fi

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Resolved PROJECT_DIR=$PROJECT_DIR"
          ls -la "$PROJECT_DIR"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail

          SDKMANAGER=""
          if command -v sdkmanager >/dev/null 2>&1; then
            SDKMANAGER="$(command -v sdkmanager)"
          elif [ -x "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
            SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          fi

          if [ -z "$SDKMANAGER" ]; then
            echo "sdkmanager not found"
            exit 127
          fi

          set +o pipefail
          yes | "$SDKMANAGER" --licenses
          set -o pipefail
          "$SDKMANAGER" "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Build Debug APK
        shell: bash
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -euo pipefail

          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

          GRADLE_CMD=""
          if [ -f "./gradlew" ] && [ -f "./gradle/wrapper/gradle-wrapper.jar" ]; then
            dos2unix ./gradlew || true
            chmod +x ./gradlew
            GRADLE_CMD="./gradlew"
          else
            echo "Gradle Wrapper JAR missing, using standalone Gradle distribution."
            GRADLE_VERSION="$(sed -n 's/.*gradle-\\([0-9.]*\\)-bin\\.zip.*/\\1/p' ./gradle/wrapper/gradle-wrapper.properties | head -n 1)"
            if [ -z "$GRADLE_VERSION" ]; then
              GRADLE_VERSION="8.7"
            fi
            echo "Using Gradle $GRADLE_VERSION"
            curl -sLo gradle.zip "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
            rm -rf "$RUNNER_TEMP/gradle"
            mkdir -p "$RUNNER_TEMP/gradle"
            unzip -q gradle.zip -d "$RUNNER_TEMP/gradle"
            GRADLE_CMD="$RUNNER_TEMP/gradle/gradle-${GRADLE_VERSION}/bin/gradle"
            chmod +x "$GRADLE_CMD" || true
          fi

          "$GRADLE_CMD" --version
          set +e
          "$GRADLE_CMD" :app:assembleDebug --console=plain --stacktrace --info --no-daemon --no-parallel --max-workers=1 -Pkotlin.compiler.execution.strategy=in-process 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e
          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo "== Build failed, error lines (tail) =="
            grep -nE "FAILURE: Build failed|\\* What went wrong:|Caused by:|Execution failed for task|^> Task |^e: |: error: " build.log | tail -n 250 || true
            echo "== Build failed, tail build.log =="
            tail -n 600 build.log || true
            exit "$BUILD_EXIT"
          fi

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ${{ env.PROJECT_DIR }}/build.log
